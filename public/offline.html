<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaleUp Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #09090b;
        color: #fafafa;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
      }
      a {
        display: inline-block;
        margin-top: 16px;
        color: white;
        background: #2563eb;
        padding: 12px 18px;
        border-radius: 16px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Anda sedang offline</h1>
      <p>Beberapa halaman MaleUp tetap dapat dibuka jika pernah tersimpan di cache.</p>
      <a href="/dashboard">Buka Dashboard</a>
    </div>
  </body>
</html>
